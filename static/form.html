<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .field {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #22d3ee;
        }
        input[type="submit"] {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #22d3ee, #818cf8);
            color: #0f172a;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        input[type="submit"]:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            color: #475569;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back:hover { color: #22d3ee; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Submit Details</h2>
        <p>Fill in your information below.</p>
        <form method="POST" action="/form">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Enter your name" />
            </div>
            <div class="field">
                <label for="profession">Profession</label>
                <input id="profession" name="profession" type="text" placeholder="Enter your profession" />
            </div>
            <input type="submit" value="Submit" />
        </form>
        <a href="/" class="back">← Back to Home</a>
    </div>
</body>
</html>
